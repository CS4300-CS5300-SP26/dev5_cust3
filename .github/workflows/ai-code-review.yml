# This GitHub Actions workflow automatically performs AI-assisted code reviews on pull requests
# by sending code changes to OpenAI and posting feedback directly on the pull request

name: AI Code Review

# Defines when the workflow should run
on:
  pull_request:
    # runs when pull request is opened, updated with new commits, or reopened
    types: [opened, synchronized, reopened]

permissions: 
  contents: read          # Allows workflow to read repository code
  pull-requests: write    # Allows workflow to post comments on pull-requests

# workflow can contain multiple jobs
jobs:
  ai-review:
    # VM job will run on
    runs-on: ubuntu-latest

    steps:
        # dowload repository cde into runner
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # downloads entire git history (helps AI analyze change more accurately)
        
        # run AI code review action
      - name: AI Code Review
        # performs AI review on pull request
        uses: coderabbitai/ai-pr-reviewer@latest
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with: 
          review_simple_changes: false
