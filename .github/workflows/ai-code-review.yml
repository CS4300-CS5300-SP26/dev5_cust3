name: AI Code Review

# Run workflow when pull request is opened, a new commit is made, or reopened
on:
  pull_request:
    types: [opened, synchronized, reopened]

# Allows workflow to read the code repo and post AI feedback
permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code              # Download repo code on Github VM
        uses: actions/checkout@v4        
        with:
          fetch-depth: 0                 # Pulls git history

      - name: Set up Python                # install python on VM
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import os
          import requests
          from openai import OpenAI

          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ["REPO"]
          pr    = os.environ["PR_NUMBER"]

          # Fetch the diff from GitHub
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github.v3.diff"
          }
          diff_url = f"https://api.github.com/repos/{repo}/pulls/{pr}"
          diff = requests.get(diff_url, headers=headers).text

          # Truncate diff file so API call doesn't fail
          if len(diff) > 15000:
              diff = diff[:15000] + "\n... (truncated)"

          # Send to OpenAI
          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          response = client.chat.completions.create(
              model="gpt-5.1-codex-mini",
              messages=[
                  {
                      "role": "system",
                      "content": (
                          "You are an expert code reviewer. Review the following git diff "
                          "and provide clear, constructive feedback. Highlight bugs, security "
                          "issues, performance problems, and style improvements. Be concise."
                      )
                  },
                  {
                      "role": "user",
                      "content": f"Please review this pull request diff:\n\n{diff}"
                  }
              ]
          )

          feedback = response.choices[0].message.content

          # Post feedback as a PR comment
          comment_url = f"https://api.github.com/repos/{repo}/issues/{pr}/comments"
          comment_headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }
          body = f"## 🤖 AI Code Review\n\n{feedback}"
          requests.post(comment_url, json={"body": body}, headers=comment_headers)

          print("Review posted successfully!")
          EOF
