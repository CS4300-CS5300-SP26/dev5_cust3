{% extends "knowledge_app/base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm mt-5">
      <div class="card-header text-white text-center" style="background-color: #001f5b;">
        <h4 class="mb-0">Sign In</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}

          {% if form.non_field_errors %}
          <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}

          <div class="d-grid mt-3">
            <button type="submit" class="btn text-white" style="background-color: #001f5b;">Login</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center text-muted py-3">
        Don't have an account?
        <a href="{% url 'register' %}" class="fw-semibold" style="color: #001f5b;">Register here</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
