{% extends "knowledge_app/base.html" %}
{% load static %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/homepage.css' %}">
<div class="homepage-wrapper">
    <div class="homepage-main">
        <h1 style="text-align: center;">Welcome to the Homepage</h1>

        <!-- Create map form -->
        <div class="create-map-form">
            <h2>Create Knowledge Map</h2>
            <form method="POST" action="{% url 'create_map' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Map Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter a title for your map" required>
                </div>
                <div class="form-group">
                    <label for="file_id">Select a PDF</label>
                    <select id="file_id" name="file_id" required>
                        <option value="">-- Select a PDF --</option>
                        {% for file in files %}
                        <option value="{{ file.id }}">{{ file.file.name }} ({{ file.uploaded_at|date:"d M Y" }})</option>
                        {% empty %}
                        <option disabled>No PDFs uploaded yet</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit">Generate Map</button>
            </form>
        </div>

    </div>

    <!--Notepad Panel-->
    <div class="notepad-panel">
        <div class="notepad-header">
            <h2>Notes</h2>
        </div>
        <textarea class="notepad-body" placeholder="Write your notes here..."></textarea>
    </div>
</div>

{% endblock %}
